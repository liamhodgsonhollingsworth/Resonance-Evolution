<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="'Segoe UI',system-ui,sans-serif" role="img" aria-labelledby="ttl desc">
  <title id="ttl">Rhythm-drum projection-teaching — in-engine simulation node graph</title>
  <desc id="desc">Music source parses to a neutral hit-timeline, a circle-instruction generator produces shrinking-ring instructions, a shared projection-map and simulated projector cast them onto a drum-kit model, and a camera-feedback calibration loop keeps the projection aligned. Optional audio-sync and reactive-scoring branches, plus tuning-knob and practice-predictor control inputs.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5b6472"/>
    </marker>
    <marker id="arrowFb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#c56a1a"/>
    </marker>
    <marker id="arrowCtl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3a7d5d"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="760" fill="#ffffff"/>
  <text x="40" y="42" font-size="24" font-weight="700" fill="#1c2430">Rhythm-drum projection-teaching — in-engine simulation node graph</text>
  <text x="40" y="66" font-size="13.5" fill="#5b6472">MIDI / MusicXML / osu  →  neutral hit-timeline  →  shrinking-circle instructions  →  shared projection-map + simulated projector  →  drum-kit model.  Calibration is a camera-feedback loop.</text>

  <!-- ============ SPINE (main dataflow, y=140) ============ -->
  <!-- Music source -->
  <g>
    <rect x="40" y="140" width="180" height="72" rx="9" fill="#eef2f8" stroke="#c4d0e0"/>
    <text x="130" y="168" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1c2430">MusicSource</text>
    <text x="130" y="188" text-anchor="middle" font-size="11.5" fill="#5b6472">MIDI · MusicXML · osu</text>
    <text x="130" y="203" text-anchor="middle" font-size="11.5" fill="#5b6472">or live e-kit port</text>
  </g>
  <!-- Hit timeline -->
  <g>
    <rect x="270" y="140" width="180" height="72" rx="9" fill="#eef2f8" stroke="#c4d0e0"/>
    <text x="360" y="168" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1c2430">HitTimeline</text>
    <text x="360" y="188" text-anchor="middle" font-size="11.5" fill="#5b6472">neutral stream:</text>
    <text x="360" y="203" text-anchor="middle" font-size="11.5" fill="#5b6472">{t, target_zone, vel}</text>
  </g>
  <!-- Circle instruction gen -->
  <g>
    <rect x="500" y="140" width="190" height="72" rx="9" fill="#eef2f8" stroke="#c4d0e0"/>
    <text x="595" y="168" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1c2430">CircleInstructionGen</text>
    <text x="595" y="188" text-anchor="middle" font-size="11.5" fill="#5b6472">pure fn (timeline,</text>
    <text x="595" y="203" text-anchor="middle" font-size="11.5" fill="#5b6472">lead_time, time_scale)</text>
  </g>
  <!-- Projection map (shared) -->
  <g>
    <rect x="740" y="140" width="180" height="72" rx="9" fill="#fbeede" stroke="#e0b988"/>
    <text x="830" y="164" text-anchor="middle" font-size="14.5" font-weight="700" fill="#7a4a12">ProjectionMap</text>
    <text x="830" y="184" text-anchor="middle" font-size="11.5" fill="#8a5a20">UV → projector px</text>
    <text x="830" y="199" text-anchor="middle" font-size="11.5" fill="#8a5a20">(homography) · SHARED</text>
  </g>
  <!-- Simulated projector (shared) -->
  <g>
    <rect x="970" y="140" width="180" height="72" rx="9" fill="#fbeede" stroke="#e0b988"/>
    <text x="1060" y="164" text-anchor="middle" font-size="14.5" font-weight="700" fill="#7a4a12">SimulatedProjector</text>
    <text x="1060" y="184" text-anchor="middle" font-size="11.5" fill="#8a5a20">rings → light-cookie</text>
    <text x="1060" y="199" text-anchor="middle" font-size="11.5" fill="#8a5a20">in View frustum · SHARED</text>
  </g>

  <!-- spine arrows -->
  <line x1="220" y1="176" x2="268" y2="176" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="176" x2="498" y2="176" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="690" y1="176" x2="738" y2="176" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="920" y1="176" x2="968" y2="176" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============ SCENE (drum kit model + render), below projector ============ -->
  <g>
    <rect x="970" y="300" width="180" height="82" rx="9" fill="#e9f0ea" stroke="#b6d0bd"/>
    <text x="1060" y="326" text-anchor="middle" font-size="14.5" font-weight="700" fill="#234a34">Drum-kit Model</text>
    <text x="1060" y="346" text-anchor="middle" font-size="11.5" fill="#3a6b4d">GLB, per-zone meshes</text>
    <text x="1060" y="361" text-anchor="middle" font-size="11.5" fill="#3a6b4d">+ target-point map</text>
    <text x="1060" y="376" text-anchor="middle" font-size="11.5" fill="#3a6b4d">(rim / bow / bell)</text>
  </g>
  <!-- projector casts onto kit -->
  <line x1="1060" y1="212" x2="1060" y2="298" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1072" y="258" font-size="11" fill="#5b6472">cast (overhead frustum)</text>

  <!-- ============ CALIBRATION FEEDBACK LOOP (the shared deliverable) ============ -->
  <rect x="708" y="430" width="470" height="196" rx="12" fill="#fdf6ee" stroke="#e0b988" stroke-dasharray="5 4"/>
  <text x="726" y="454" font-size="13.5" font-weight="700" fill="#7a4a12">ProjectionCalibration — camera-feedback loop (SHARED)</text>

  <g>
    <rect x="726" y="470" width="150" height="60" rx="8" fill="#fff" stroke="#e0b988"/>
    <text x="801" y="494" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7a4a12">Project pattern</text>
    <text x="801" y="512" text-anchor="middle" font-size="11" fill="#8a5a20">checker / ArUco</text>
  </g>
  <g>
    <rect x="1012" y="470" width="150" height="60" rx="8" fill="#fff" stroke="#e0b988"/>
    <text x="1087" y="494" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7a4a12">Witness View</text>
    <text x="1087" y="512" text-anchor="middle" font-size="11" fill="#8a5a20">camera renders kit</text>
  </g>
  <g>
    <rect x="1012" y="552" width="150" height="60" rx="8" fill="#fff" stroke="#e0b988"/>
    <text x="1087" y="576" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7a4a12">Detect + Solve</text>
    <text x="1087" y="594" text-anchor="middle" font-size="11" fill="#8a5a20">corners → homography</text>
  </g>
  <g>
    <rect x="726" y="552" width="150" height="60" rx="8" fill="#fff" stroke="#e0b988"/>
    <text x="801" y="572" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7a4a12">Residual check</text>
    <text x="801" y="590" text-anchor="middle" font-size="11" fill="#8a5a20">under thresh? hold :</text>
    <text x="801" y="604" text-anchor="middle" font-size="11" fill="#8a5a20">re-solve on drift</text>
  </g>
  <!-- loop arrows -->
  <line x1="876" y1="500" x2="1010" y2="500" stroke="#c56a1a" stroke-width="2" marker-end="url(#arrowFb)"/>
  <line x1="1087" y1="530" x2="1087" y2="550" stroke="#c56a1a" stroke-width="2" marker-end="url(#arrowFb)"/>
  <line x1="1010" y1="582" x2="878" y2="582" stroke="#c56a1a" stroke-width="2" marker-end="url(#arrowFb)"/>
  <line x1="801" y1="550" x2="801" y2="532" stroke="#c56a1a" stroke-width="2" marker-end="url(#arrowFb)"/>

  <!-- calibration writes ProjectionMap -->
  <path d="M801 468 C801 300 830 260 830 214" fill="none" stroke="#c56a1a" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrowFb)"/>
  <text x="600" y="330" font-size="11" fill="#c56a1a">solved warp → ProjectionMap</text>
  <!-- projector feeds pattern into loop; witness sees kit -->
  <path d="M1000 212 C1010 360 900 420 850 468" fill="none" stroke="#c56a1a" stroke-width="1.6" stroke-dasharray="3 3" marker-end="url(#arrowFb)"/>
  <path d="M1120 384 C1140 420 1120 448 1105 468" fill="none" stroke="#c56a1a" stroke-width="1.6" stroke-dasharray="3 3" marker-end="url(#arrowFb)"/>

  <!-- ============ OPTIONAL BRANCHES off HitTimeline ============ -->
  <!-- audio sync -->
  <g>
    <rect x="270" y="300" width="200" height="66" rx="9" fill="#f1f3f5" stroke="#cdd4dc"/>
    <text x="370" y="326" text-anchor="middle" font-size="13.5" font-weight="700" fill="#33404f">AudioPlayer + Sync</text>
    <text x="370" y="345" text-anchor="middle" font-size="11" fill="#5b6472">master-clock + ms-offset</text>
    <text x="370" y="358" text-anchor="middle" font-size="11" fill="#5b6472">(reuse · shipped)</text>
  </g>
  <line x1="360" y1="212" x2="360" y2="298" stroke="#5b6472" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- optional scoring -->
  <g>
    <rect x="270" y="410" width="200" height="66" rx="9" fill="#f1f3f5" stroke="#cdd4dc" stroke-dasharray="4 3"/>
    <text x="370" y="436" text-anchor="middle" font-size="13.5" font-weight="700" fill="#33404f">HitDetector → Scorer</text>
    <text x="370" y="455" text-anchor="middle" font-size="11" fill="#5b6472">OPTIONAL osu-style accuracy</text>
    <text x="370" y="468" text-anchor="middle" font-size="11" fill="#5b6472">never gates generation</text>
  </g>
  <path d="M330 212 C320 340 330 372 350 408" fill="none" stroke="#5b6472" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="150" y="452" font-size="11" fill="#5b6472">input events</text>
  <line x1="150" y1="443" x2="268" y2="443" stroke="#8a94a2" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ============ CONTROL INPUTS into CircleInstructionGen ============ -->
  <g>
    <rect x="500" y="300" width="190" height="60" rx="9" fill="#e9f0ea" stroke="#b6d0bd"/>
    <text x="595" y="324" text-anchor="middle" font-size="13" font-weight="700" fill="#234a34">TuningKnob → time_scale</text>
    <text x="595" y="343" text-anchor="middle" font-size="11" fill="#3a6b4d">dynamic-BPM knob (reuse)</text>
  </g>
  <g>
    <rect x="500" y="372" width="190" height="52" rx="9" fill="#e9f0ea" stroke="#b6d0bd"/>
    <text x="595" y="393" text-anchor="middle" font-size="13" font-weight="700" fill="#234a34">TuningKnob → lead_time</text>
    <text x="595" y="411" text-anchor="middle" font-size="11" fill="#3a6b4d">approach-rate / difficulty</text>
  </g>
  <g>
    <rect x="500" y="436" width="190" height="60" rx="9" fill="#e9f0ea" stroke="#b6d0bd"/>
    <text x="595" y="460" text-anchor="middle" font-size="13" font-weight="700" fill="#234a34">SPEC-229 predictor</text>
    <text x="595" y="479" text-anchor="middle" font-size="11" fill="#3a6b4d">session-start BPM seed →</text>
    <text x="595" y="492" text-anchor="middle" font-size="11" fill="#3a6b4d">writes speed-ladder back</text>
  </g>
  <line x1="595" y1="298" x2="595" y2="214" stroke="#3a7d5d" stroke-width="1.8" marker-end="url(#arrowCtl)"/>
  <path d="M690 396 C720 396 700 240 660 214" fill="none" stroke="#3a7d5d" stroke-width="1.6" marker-end="url(#arrowCtl)"/>
  <path d="M690 466 C740 466 730 250 640 214" fill="none" stroke="#3a7d5d" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arrowCtl)"/>

  <!-- ============ LEGEND ============ -->
  <g>
    <rect x="40" y="640" width="620" height="96" rx="10" fill="#fafbfc" stroke="#e2e6eb"/>
    <text x="56" y="664" font-size="12.5" font-weight="700" fill="#33404f">Legend</text>

    <rect x="56" y="676" width="20" height="14" rx="3" fill="#eef2f8" stroke="#c4d0e0"/>
    <text x="84" y="687" font-size="11.5" fill="#33404f">Music/instruction pipeline (new thin primitives)</text>

    <rect x="360" y="676" width="20" height="14" rx="3" fill="#fbeede" stroke="#e0b988"/>
    <text x="388" y="687" font-size="11.5" fill="#33404f">SHARED projection substrate (whole family)</text>

    <rect x="56" y="698" width="20" height="14" rx="3" fill="#e9f0ea" stroke="#b6d0bd"/>
    <text x="84" y="709" font-size="11.5" fill="#33404f">Reused primitives (Model/View, knobs, sync)</text>

    <rect x="360" y="698" width="20" height="14" rx="3" fill="#f1f3f5" stroke="#cdd4dc" stroke-dasharray="4 3"/>
    <text x="388" y="709" font-size="11.5" fill="#33404f">Optional branch (audio / scoring)</text>

    <line x1="56" y1="726" x2="86" y2="726" stroke="#c56a1a" stroke-width="2"/>
    <text x="94" y="730" font-size="11.5" fill="#33404f">camera-feedback calibration</text>
    <line x1="290" y1="726" x2="320" y2="726" stroke="#3a7d5d" stroke-width="2"/>
    <text x="328" y="730" font-size="11.5" fill="#33404f">control input (real values)</text>
    <line x1="520" y1="726" x2="550" y2="726" stroke="#5b6472" stroke-width="2"/>
    <text x="558" y="730" font-size="11.5" fill="#33404f">dataflow</text>
  </g>

  <!-- note -->
  <text x="700" y="700" font-size="11.5" fill="#7a4a12" font-style="italic">Doing this arc first builds the shared ProjectionMap + ProjectionCalibration + SimulatedProjector</text>
  <text x="700" y="718" font-size="11.5" fill="#7a4a12" font-style="italic">nodes the laser-projector and website-projection/audio-sync arcs both need.</text>
</svg>
